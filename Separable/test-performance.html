<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceMesh 性能测试 - Tasks Vision</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f23;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        .container { text-align: center; }
        h1 { font-size: 24px; margin-bottom: 30px; color: #4ecca3; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            min-width: 200px;
        }
        .stat-value {
            font-size: 56px;
            font-weight: bold;
            color: #4ecca3;
            font-family: 'Courier New', monospace;
        }
        .stat-label { font-size: 14px; color: #888; margin-top: 10px; }
        .video-box {
            position: relative;
            display: inline-block;
            margin: 20px 0;
        }
        video {
            width: 320px;
            height: 240px;
            border-radius: 10px;
            transform: scaleX(-1);
            background: #000;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,255,0,0.9);
            color: #000;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-family: monospace;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #4ecca3, #2d8a6e);
            color: #0f0f23;
            font-weight: bold;
            margin: 10px;
        }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status {
            margin-top: 20px;
            padding: 15px;
            background: #16213e;
            border-radius: 10px;
            min-height: 50px;
        }
        .good { color: #4ecca3; }
        .warn { color: #f39c12; }
        .bad { color: #e74c3c; }
        #debug {
            margin-top: 20px;
            padding: 10px;
            background: #0a0a1a;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #888;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 FaceMesh 性能测试 (Tasks Vision)</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="fpsValue">0</div>
                <div class="stat-label">FPS (帧率)</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="sendRate">0</div>
                <div class="stat-label">检测到人脸/秒</div>
            </div>
        </div>
        <div class="video-box">
            <video id="video" width="320" height="240" playsinline autoplay muted></video>
            <div id="fps">FPS: 0</div>
        </div>
        <div>
            <button id="startBtn">🚀 启动测试</button>
            <button id="stopBtn" disabled>⏹ 停止</button>
        </div>
        <div id="status">点击"启动测试"开始...</div>
        <div id="debug">初始化中...</div>
    </div>

    <!-- 使用 MediaPipe Tasks Vision API (新版本，更稳定) -->
    <script type="module">
        import { FilesetResolver, FaceLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';

        const VIDEO_WIDTH = 320;
        const VIDEO_HEIGHT = 240;
        let isRunning = false, frameCount = 0, fps = 0, sendCount = 0, sendPerSecond = 0, faceDetected = false, frameNum = 0;
        let lastFpsTime = performance.now(), lastSendTime = performance.now();
        let faceLandmarker = null;

        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fpsValueEl = document.getElementById('fpsValue');
        const sendRateEl = document.getElementById('sendRate');
        const fpsEl = document.getElementById('fps');
        const debugDiv = document.getElementById('debug');

        function updateStatus(msg, type = '') {
            document.getElementById('status').innerHTML = `<span class="${type}">${msg}</span>`;
        }

        function updateStats() {
            const now = performance.now();
            frameCount++;
            if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
                fpsValueEl.textContent = fps;
                fpsEl.textContent = `FPS: ${fps}`;
                if (fps >= 25) updateStatus(`✅ 性能优秀！FPS: ${fps} ${faceDetected ? '| 🧑 检测到人脸' : ''}`, 'good');
                else if (fps >= 15) updateStatus(`⚠️ 性能一般！FPS: ${fps} ${faceDetected ? '| 🧑 检测到人脸' : ''}`, 'warn');
                else updateStatus(`❌ 性能较差！FPS: ${fps}`, 'bad');
            }
            if (faceDetected) sendCount++;
            if (now - lastSendTime >= 1000) {
                sendPerSecond = sendCount;
                sendCount = 0;
                lastSendTime = now;
                sendRateEl.textContent = sendPerSecond;
            }
        }

        // 初始化 FaceLandmarker
        async function initFaceLandmarker() {
            debugDiv.textContent = '正在加载模型...';
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                        delegate: 'GPU'
                    },
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: false,
                    runningMode: 'VIDEO',
                    maxNumFaces: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                debugDiv.textContent = '✅ 模型加载完成';
                return true;
            } catch (error) {
                debugDiv.textContent = '❌ 模型加载失败：' + error.message;
                console.error('模型加载错误:', error);
                return false;
            }
        }

        function processFrame() {
            if (!isRunning || !faceLandmarker) return;
            try {
                const startTime = performance.now();
                const results = faceLandmarker.detectForVideo(video, startTime);
                
                frameNum++;
                faceDetected = results.faceLandmarks && results.faceLandmarks.length > 0;
                
                if (frameNum % 30 === 0) {
                    debugDiv.textContent = `帧数：${frameNum} | 人脸：${faceDetected ? '✅' : '❌'} | landmarks: ${results.faceLandmarks?.[0]?.length || 0}`;
                }
                
                updateStats();
                
                if (faceDetected) {
                    const data = { 
                        type: 'facemesh', 
                        timestamp: Date.now(), 
                        landmarks: results.faceLandmarks[0].map(lm => ({ x: lm.x, y: lm.y, z: lm.z })) 
                    };
                    const dataSizeKB = Math.round(JSON.stringify(data).length / 1024 * 10) / 10;
                    updateStatus(`✅ 检测到人脸 | FPS: ${fps} | 数据：${dataSizeKB}KB | 发送：${sendPerSecond}/秒`, 'good');
                }
                
                requestAnimationFrame(processFrame);
            } catch (error) {
                console.error('处理帧错误:', error);
                debugDiv.textContent = '❌ 处理错误：' + error.message;
            }
        }

        async function start() {
            try {
                updateStatus('🔄 正在启动摄像头...');
                debugDiv.textContent = '请求摄像头权限...';
                
                // 先加载模型
                if (!faceLandmarker) {
                    const success = await initFaceLandmarker();
                    if (!success) return;
                }
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: VIDEO_WIDTH, height: VIDEO_HEIGHT } 
                });
                video.srcObject = stream;
                
                await new Promise(resolve => { 
                    video.onloadedmetadata = () => { 
                        video.play(); 
                        debugDiv.textContent = `摄像头已启动，视频尺寸：${video.videoWidth}x${video.videoHeight}`;
                        resolve(); 
                    }; 
                });
                
                isRunning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                updateStatus('✅ 已启动！请将脸对准摄像头（光线充足）', 'good');
                
                processFrame();
                
            } catch (error) {
                updateStatus('❌ 启动失败：' + error.message, 'bad');
                debugDiv.textContent = '错误：' + error.message;
                console.error(error);
            }
        }

        function stop() {
            isRunning = false;
            if (video.srcObject) { 
                video.srcObject.getTracks().forEach(track => track.stop()); 
                video.srcObject = null; 
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            fpsValueEl.textContent = '0';
            sendRateEl.textContent = '0';
            fpsEl.textContent = 'FPS: 0';
            updateStatus('⏹ 已停止');
            debugDiv.textContent = '已停止';
        }

        startBtn.onclick = start;
        stopBtn.onclick = stop;
        
        // 初始化
        updateStatus('👋 点击"启动测试"开始');
        debugDiv.textContent = '准备就绪';
    </script>
</body>
</html>
