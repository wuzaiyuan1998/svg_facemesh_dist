<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceMesh 面捕端 - 电脑 B</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: white; margin-bottom: 10px; }
        .status { color: #e0e7ff; margin-bottom: 20px; font-size: 14px; }
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            border-radius: 10px;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 10;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #10b981;
            color: white;
            font-weight: bold;
        }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #connectionStatus {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .connected { background: #d1fae5; color: #065f46; }
        .disconnected { background: #fee2e2; color: #991b1b; }
        .connecting { background: #fef3c7; color: #92400e; }
        #dataPreview {
            margin-top: 15px;
            padding: 10px;
            background: #f3f4f6;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>📹 FaceMesh 面捕端</h1>
    <div class="status">电脑 B - 面部数据采集</div>
    
    <div class="container">
        <div class="video-wrapper">
            <video id="video" width="640" height="480" playsinline autoplay muted></video>
            <canvas id="canvas" width="640" height="480"></canvas>
            <div id="fps">FPS: 0</div>
        </div>
        
        <div class="controls">
            <button id="startBtn">🚀 启动面捕</button>
            <button id="stopBtn" disabled>⏹ 停止</button>
        </div>

        <div id="status" style="color:white;margin:10px 0;text-align:center;">点击"启动"开始</div>
        <div id="connectionStatus" class="disconnected">未连接 WebSocket</div>
        
        <div id="dataPreview"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <script>
        // 配置
        const WS_URL = `ws://${window.location.hostname}:16666/ws`;
        const VIDEO_WIDTH = 320;   // 🔥 降低分辨率提高性能
        const VIDEO_HEIGHT = 240;
        const DEBUG_MODE = false; // 🔥 设置为 true 启用网格绘制

        // 设置全局调试模式
        window.DEBUG_MODE = DEBUG_MODE;

        // 状态
        let ws = null;
        let isRunning = false;
        let lastFrameTime = 0;
        let frameCount = 0;
        let fps = 0;

        // DOM 元素
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const connectionStatus = document.getElementById('connectionStatus');

        // 连接 WebSocket
        function connectWebSocket() {
            connectionStatus.className = 'connecting';
            connectionStatus.textContent = '连接中...';

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                connectionStatus.className = 'connected';
                connectionStatus.textContent = '✅ 已连接 WebSocket';
                console.log('WebSocket 连接成功');
            };

            ws.onclose = () => {
                connectionStatus.className = 'disconnected';
                connectionStatus.textContent = '❌ 未连接 WebSocket';
                console.log('WebSocket 连接关闭');
                // 3 秒后重连
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket 错误:', error);
            };

            ws.onmessage = (event) => {
                console.log('收到消息:', event.data);
            };
        }

        // 🔥 发送原始面捕数据（最简单，最高性能）
        // 带宽不是问题（局域网），把计算压力转移到渲染端
        let lastSendTime = 0;
        const SEND_INTERVAL = 1000 / 30; // 30 FPS

        function sendFaceMeshData(results) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            // 限流：30 FPS
            const now = performance.now();
            if (now - lastSendTime < SEND_INTERVAL) return;
            lastSendTime = now;

            const landmarks = results.multiFaceLandmarks[0];

            // 直接发送原始数据，不做任何计算
            const data = {
                type: 'facemesh',
                timestamp: Date.now(),
                // 完整的 468 个 landmarks 点
                landmarks: landmarks.map(lm => ({
                    x: lm.x,
                    y: lm.y,
                    z: lm.z
                }))
            };

            ws.send(JSON.stringify(data));
        }
        
        // 计算 FPS
        function updateFPS() {
            const now = performance.now();
            frameCount++;
            
            if (now - lastFrameTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFrameTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }
        
        // 初始化 FaceMesh
        const faceMesh = new FaceMesh({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,  // 🔥 需要虹膜关键点（渲染端使用）
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        faceMesh.onResults((results) => {
            if (!isRunning) return;

            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                // 🔥 性能优化：只在开发模式下绘制网格（生产环境注释掉）
                // 绘制 FaceMesh 网格非常耗时，会影响 FPS
                if (window.DEBUG_MODE) {
                    drawConnectors(ctx, landmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
                    drawConnectors(ctx, landmarks, FACEMESH_RIGHT_EYE, {color: '#FF3030', lineWidth: 2});
                    drawConnectors(ctx, landmarks, FACEMESH_RIGHT_EYEBROW, {color: '#FF3030', lineWidth: 2});
                    drawConnectors(ctx, landmarks, FACEMESH_LEFT_EYE, {color: '#30FF30', lineWidth: 2});
                    drawConnectors(ctx, landmarks, FACEMESH_LEFT_EYEBROW, {color: '#30FF30', lineWidth: 2});
                    drawConnectors(ctx, landmarks, FACEMESH_LIPS, {color: '#E0E0E0', lineWidth: 2});
                }

                // 发送数据（每帧都发送）
                sendFaceMeshData(results);
            }

            updateFPS();
        });
        
        // 启动面捕
        async function startCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: VIDEO_WIDTH, height: VIDEO_HEIGHT }
                });
                video.srcObject = stream;

                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });

                isRunning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.textContent = '✅ 运行中 - 请面对摄像头';

                // 开始处理视频帧 - 🔥 优化：使用 requestAnimationFrame 但不等待
                function processFrame() {
                    if (!isRunning) return;

                    // 异步发送，不阻塞下一帧
                    faceMesh.send({ image: video }).catch(err => {
                        console.error('FaceMesh 处理错误:', err);
                    });

                    requestAnimationFrame(processFrame);
                }

                processFrame();

            } catch (error) {
                console.error('启动面捕失败:', error);
                alert('无法访问摄像头：' + error.message);
            }
        }
        
        // 停止面捕
        function stopCapture() {
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        // 事件监听
        startBtn.addEventListener('click', startCapture);
        stopBtn.addEventListener('click', stopCapture);
        
        // 初始化连接
        connectWebSocket();
    </script>
</body>
</html>
