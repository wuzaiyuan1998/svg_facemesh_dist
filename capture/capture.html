<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceMesh 面捕端 - 电脑 B</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: white; margin-bottom: 10px; }
        .status { color: #e0e7ff; margin-bottom: 20px; font-size: 14px; }
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }
        video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            border-radius: 10px;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 10;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #10b981;
            color: white;
            font-weight: bold;
        }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #connectionStatus {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .connected { background: #d1fae5; color: #065f46; }
        .disconnected { background: #fee2e2; color: #991b1b; }
        .connecting { background: #fef3c7; color: #92400e; }
        .config-panel {
            margin-top: 15px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 8px;
        }
        .config-panel label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #374151;
        }
        .config-panel input {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
        }
        .config-panel button {
            margin-top: 10px;
            padding: 8px 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .config-panel button:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <h1>📹 FaceMesh 面捕端</h1>
    <div class="status">电脑 B - 面部数据采集</div>

    <div class="container">
        <div class="video-wrapper">
            <video id="video" width="320" height="240" playsinline autoplay muted></video>
            <div id="fps">FPS: 0</div>
        </div>

        <div class="controls">
            <button id="startBtn">🚀 启动面捕</button>
            <button id="stopBtn" disabled>⏹ 停止</button>
        </div>

        <div id="status" style="color:#6b7280;margin:10px 0;text-align:center;">点击"启动"开始</div>
        <div id="connectionStatus" class="disconnected">未连接 WebSocket</div>
        
        <!-- 🔥 WebSocket 配置面板 -->
        <div class="config-panel">
            <label for="wsUrl">🔧 WebSocket 服务器地址：</label>
            <input type="text" id="wsUrl" value="ws://localhost:16666/ws" placeholder="例如：ws://192.168.1.100:16666/ws">
            <button onclick="saveAndReconnect()">💾 保存并重新连接</button>
        </div>
    </div>

    <!-- 使用 MediaPipe Tasks Vision API (新版本，更稳定) -->
    <script type="module">
        import { FilesetResolver, FaceLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';
        
        // 🔥 配置：从 localStorage 读取 WebSocket 地址
        let WS_URL = localStorage.getItem('facemesh_ws_url') || `ws://${window.location.hostname}:16666/ws`;
        
        const VIDEO_WIDTH = 320;
        const VIDEO_HEIGHT = 240;
        const DEBUG_MODE = false;

        window.DEBUG_MODE = DEBUG_MODE;
        
        // 🔥 更新输入框的值
        document.addEventListener('DOMContentLoaded', () => {
            const wsUrlInput = document.getElementById('wsUrl');
            if (wsUrlInput) {
                wsUrlInput.value = WS_URL;
            }
        });

        // 状态
        let ws = null;
        let isRunning = false;
        let frameCount = 0;
        let fps = 0;
        let lastFrameTime = performance.now();
        let faceLandmarker = null;

        // 🔥 发送限流：30 FPS
        let lastSendTime = 0;
        const SEND_INTERVAL = 1000 / 30; // 33ms

        // DOM 元素
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const statusEl = document.getElementById('status');
        const wsUrlInput = document.getElementById('wsUrl');

        // 连接 WebSocket
        function connectWebSocket() {
            connectionStatus.className = 'connecting';
            connectionStatus.textContent = '连接中...';
            
            // 关闭旧连接
            if (ws) {
                ws.close();
            }
            
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                connectionStatus.className = 'connected';
                connectionStatus.textContent = '✅ 已连接 WebSocket';
                console.log('WebSocket 连接成功');
                // 注册为面捕端
                ws.send(JSON.stringify({ type: 'register_capture' }));
            };
            ws.onclose = () => {
                connectionStatus.className = 'disconnected';
                connectionStatus.textContent = '❌ 未连接 WebSocket';
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = (error) => console.error('WebSocket 错误:', error);
        }
        
        // 🔥 保存配置并重新连接
        window.saveAndReconnect = function() {
            const newUrl = wsUrlInput.value.trim();
            if (!newUrl) {
                alert('请输入有效的 WebSocket 地址');
                return;
            }
            
            // 验证格式
            if (!newUrl.startsWith('ws://') && !newUrl.startsWith('wss://')) {
                alert('WebSocket 地址必须以 ws:// 或 wss:// 开头');
                return;
            }
            
            // 保存到 localStorage
            localStorage.setItem('facemesh_ws_url', newUrl);
            WS_URL = newUrl;
            
            alert('✅ 已保存配置，正在重新连接...');
            connectWebSocket();
        };

        // 发送面捕数据
        function sendFaceMeshData(landmarks) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            // 🔥 限流：30 FPS
            const now = performance.now();
            if (now - lastSendTime < SEND_INTERVAL) return;
            lastSendTime = now;
            
            const data = {
                type: 'facemesh',
                timestamp: Date.now(),
                landmarks: landmarks.map(lm => ({ x: lm.x, y: lm.y, z: lm.z }))
            };
            
            try {
                ws.send(JSON.stringify(data));
            } catch (error) {
                console.error('WebSocket 发送失败:', error);
            }
        }

        // FPS 计算
        function updateFPS() {
            const now = performance.now();
            frameCount++;
            if (now - lastFrameTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFrameTime = now;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
        }

        // 初始化 FaceLandmarker
        async function initFaceLandmarker() {
            statusEl.textContent = '🔄 正在加载模型...';
            const vision = await FilesetResolver.forVisionTasks(
                'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                    delegate: 'GPU'
                },
                outputFaceBlendshapes: false,
                outputFacialTransformationMatrixes: false,
                runningMode: 'VIDEO',
                maxNumFaces: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            statusEl.textContent = '✅ 模型加载完成';
        }

        // 处理帧
        function processFrame() {
            if (!isRunning || !faceLandmarker) return;
            
            const startTime = performance.now();
            const results = faceLandmarker.detectForVideo(video, startTime);
            const detectTime = performance.now() - startTime;
            
            updateFPS();

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];
                statusEl.textContent = `✅ 追踪中 - ${landmarks.length} 个点 | 检测耗时：${detectTime.toFixed(1)}ms`;
                sendFaceMeshData(landmarks);
            } else {
                statusEl.textContent = `🔍 未检测到面部 | 检测耗时：${detectTime.toFixed(1)}ms`;
            }

            requestAnimationFrame(processFrame);
        }

        // 启动面捕
        async function startCapture() {
            try {
                if (!faceLandmarker) await initFaceLandmarker();

                // 🔥 兼容性检查：获取摄像头权限
                const getUserMedia = navigator.mediaDevices?.getUserMedia || 
                                     navigator.webkitGetUserMedia || 
                                     navigator.mozGetUserMedia;
                
                if (!getUserMedia) {
                    throw new Error('浏览器不支持摄像头访问，请使用 Chrome/Edge 浏览器，并确保使用 http://localhost 或 https:// 访问');
                }

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: VIDEO_WIDTH, height: VIDEO_HEIGHT }
                });
                video.srcObject = stream;
                await new Promise(resolve => {
                    video.onloadedmetadata = () => { video.play(); resolve(); };
                });

                isRunning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusEl.textContent = '✅ 运行中 - 请面对摄像头';
                processFrame();
            } catch (error) {
                statusEl.textContent = '❌ 错误：' + error.message;
                console.error('启动错误:', error);
                
                // 🔥 提供更详细的错误提示
                if (error.name === 'NotAllowedError') {
                    statusEl.textContent = '❌ 摄像头权限被拒绝，请在浏览器地址栏右侧允许摄像头权限';
                } else if (error.name === 'NotFoundError') {
                    statusEl.textContent = '❌ 未找到摄像头设备';
                } else if (location.protocol !== 'http:' && location.protocol !== 'https:') {
                    statusEl.textContent = '❌ 请使用 http://localhost 或文件服务器访问（不能直接打开文件）';
                }
            }
        }

        // 停止面捕
        function stopCapture() {
            isRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusEl.textContent = '已停止';
        }

        startBtn.addEventListener('click', startCapture);
        stopBtn.addEventListener('click', stopCapture);
        connectWebSocket();
    </script>
</body>
</html>
