<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六角恐龙 - FaceMesh 表情捕捉（MediaPipe Tasks Vision）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: white; margin-bottom: 10px; }
        .subtitle { color: #e0e7ff; margin-bottom: 20px; font-size: 14px; }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
        }
        .video-panel, .svg-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .video-panel { position: relative; }
        video { display: block; transform: scaleX(-1); border-radius: 10px; }
        canvas {
            position: absolute;
            top: 20px;
            left: 20px;
            transform: scaleX(-1);
            pointer-events: none;
        }
        #character {
            width: 500px;
            height: 500px;
            background: linear-gradient(to bottom, #f0f9ff, #e0f2fe);
            border-radius: 10px;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #10b981;
            color: white;
            font-weight: bold;
        }
        #liveModeBtn {
            background: #f59e0b;
        }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status {
            color: #ffd700;
            margin: 15px 0;
            font-size: 14px;
            text-align: center;
        }
        #fps {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 10;
        }
        .info {
            margin-top: 20px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .info h3 { color: #667eea; margin-bottom: 10px; }
        .info ul { margin-left: 20px; color: #4b5563; }

        /* 直播模式样式 */
        body.live-mode-active {
            background: transparent !important;
        }
        body.live-mode-active > h1,
        body.live-mode-active > .subtitle,
        body.live-mode-active > #status,
        body.live-mode-active > .container > .video-panel,
        body.live-mode-active > .controls,
        body.live-mode-active > .info,
        body.live-mode-active > #debug-panel {
            display: none;
        }
        body.live-mode-active > .container {
            padding: 0;
            margin: 0;
            max-width: 100vw;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }
        body.live-mode-active .svg-panel {
            background: transparent;
            box-shadow: none;
            padding: 0;
        }
        body.live-mode-active #character {
            background: transparent;
        }

    </style>
</head>
<body>
<h1>🦎 六角恐龙 - FaceMesh 表情捕捉（MediaPipe Tasks Vision）</h1>
<div class="subtitle">分层动捕 - 头部/眼睛/尾巴独立控制</div>
<div id="status">点击"启动"开始</div>

<div class="container">
    <div class="video-panel">
        <video id="video" width="640" height="480" playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
        <div id="fps">FPS: 0</div>
    </div>

    <div class="svg-panel">
        <svg id="character" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4CC9F0"/>
                    <stop offset="100%" stop-color="#4CAF50"/>
                </linearGradient>
                <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
                    <stop offset="100%" stop-color="#e0f7fa" stop-opacity="0.7"/>
                </linearGradient>
            </defs>

            <!-- ============ 图层 1: 身体组（整体动捕：平移 + 缩放） ============ -->
            <g id="layer-body-group">
                <!-- 尾巴（独立摆动） -->
                <g id="layer-tail">
                    <path id="tail" d="M140 340 Q90 450 140 560 Q200 660 310 610 L330 510 Z"
                          fill="#FFF9E6" stroke="#000" stroke-width="18"/>
                    <path d="M155 375 L225 415" stroke="#FF9F1C" stroke-width="8" stroke-linecap="round"/>
                    <path d="M165 415 L235 455" stroke="#FF9F1C" stroke-width="8" stroke-linecap="round"/>
                    <path d="M175 455 L245 495" stroke="#FF9F1C" stroke-width="8" stroke-linecap="round"/>
                    <path d="M185 495 L255 535" stroke="#FF9F1C" stroke-width="8" stroke-linecap="round"/>
                    <path d="M195 535 L265 575" stroke="#FF9F1C" stroke-width="8" stroke-linecap="round"/>
                    <path d="M215 475 L305 495" stroke="#FF5A5F" stroke-width="14" stroke-linecap="round"/>
                </g>

                <!-- 头部组 -->
                <g id="layer-head">
                    <!-- 头部主体形状 -->
                    <path id="head-shape" d="M320 190 Q400 110 570 190 Q650 270 670 400 Q650 530 590 610 Q530 660 420 670 Q320 660 260 610 Q220 560 220 510 L330 510 Q330 410 320 190 Z"
                          fill="#FFD166" stroke="#000" stroke-width="18"/>

                    <!-- 头部斑点 -->
                    <g id="head-spots">
                        <circle cx="420" cy="215" r="10" fill="#FFB347"/>
                        <circle cx="450" cy="205" r="12" fill="#FFB347"/>
                        <circle cx="480" cy="215" r="10" fill="#FFB347"/>
                        <circle cx="510" cy="225" r="12" fill="#FFB347"/>
                        <circle cx="440" cy="235" r="10" fill="#FFB347"/>
                        <circle cx="490" cy="245" r="10" fill="#FFB347"/>
                    </g>

                    <!-- 外鳃 -->
                    <g id="layer-gills">
                        <g id="gill-left" fill="#FF5A5F" stroke="#000" stroke-width="14">
                            <path d="M320 210 Q270 170 290 130 Q330 170 320 210 Z"/>
                            <path d="M310 250 Q250 230 270 190 Q310 230 310 250 Z"/>
                            <path d="M300 290 Q250 280 270 250 Q310 280 300 290 Z"/>
                        </g>
                        <g id="gill-right" fill="#FF5A5F" stroke="#000" stroke-width="14">
                            <path d="M560 210 Q610 170 590 130 Q550 170 560 210 Z"/>
                            <path d="M570 250 Q630 230 610 190 Q570 230 570 250 Z"/>
                            <path d="M580 290 Q630 280 610 250 Q570 280 580 290 Z"/>
                        </g>
                    </g>

                    <!-- 眼睛眼眶 -->
                    <g id="layer-eyes">
                        <g id="eye-left-socket">
                            <circle id="eye-left-outer" cx="380" cy="320" r="62" fill="url(#eyeGrad)" stroke="#000" stroke-width="8"/>
                        </g>
                        <g id="eye-right-socket">
                            <circle id="eye-right-outer" cx="520" cy="320" r="62" fill="url(#eyeGrad)" stroke="#000" stroke-width="8"/>
                        </g>
                        <ellipse id="eye-left-inner" cx="380" cy="320" rx="32" ry="32" fill="#000"/>
                        <circle id="eye-left-highlight" cx="396" cy="306" r="14" fill="#FFF"/>
                        <ellipse id="eye-right-inner" cx="520" cy="320" rx="32" ry="32" fill="#000"/>
                        <circle id="eye-right-highlight" cx="536" cy="306" r="14" fill="#FFF"/>
                    </g>

                </g>

                <!-- 腮红层（独立于头部，在身体组内） -->
                <g id="layer-blush">
                    <circle id="blush-left" cx="340" cy="380" r="28" fill="#FFB3C1" opacity="0.8"/>
                    <circle id="blush-right" cx="560" cy="380" r="28" fill="#FFB3C1" opacity="0.8"/>
                </g>

                <!-- 腹部 -->
                <g id="layer-belly">
                    <path d="M400 470 Q500 490 600 470 Q580 610 520 650 Q420 660 320 650 Q280 610 400 470 Z"
                          fill="#FFB3C1"/>
                </g>

                <!-- 嘴巴（在腹部之上） -->
                <g id="layer-mouth">
                    <path id="mouth" d="M420 420 Q450 445 480 420" fill="none" stroke="#E76F51" stroke-width="10" stroke-linecap="round"/>
                </g>

                <!-- 四肢 -->
                <g id="layer-limbs">
                    <path d="M360 510 Q340 600 380 625 Q400 670 420 625 Q440 600 420 580 Z"
                          fill="#FF9F1C" stroke="#000" stroke-width="14"/>
                    <path d="M540 510 Q560 600 520 625 Q500 670 480 625 Q460 600 480 580 Z"
                          fill="#FF9F1C" stroke="#000" stroke-width="14"/>
                    <path d="M280 570 Q260 650 300 675 Q320 720 340 675 Q360 650 340 620 Z"
                          fill="#FF9F1C" stroke="#000" stroke-width="14"/>
                    <path d="M620 570 Q640 650 600 675 Q580 720 560 675 Q540 650 560 620 Z"
                          fill="#FF9F1C" stroke="#000" stroke-width="14"/>
                </g>
            </g>

            <!-- ============ 图层 2: 泡泡（最上层，不跟随动捕） ============ -->
            <g id="bubble-container"></g>
        </svg>
    </div>
</div>

<div class="controls">
    <button id="startBtn">启动</button>
    <button id="stopBtn" disabled>停止</button>
    <button id="liveModeBtn">进入直播模式</button>
</div>

<div class="info">
    <h3>📖 使用说明</h3>
    <ul>
        <li>点击"启动"允许浏览器访问摄像头</li>
        <li>面对摄像头，六角恐龙会模仿你的表情</li>
        <li><strong>头部追踪</strong>：头部平移 + 形变（外鳃跟随）</li>
        <li><strong>眼睛追踪</strong>：眼眶独立平移，瞳孔跟随</li>
        <li><strong>尾巴摆动</strong>：待机自动摆动</li>
        <li><strong>MediaPipe Tasks Vision</strong>：使用最新 API，性能更好</li>
    </ul>
</div>

<!-- 使用 MediaPipe Tasks Vision API（新版本） -->
<script type="module">
    import { FilesetResolver, FaceLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const liveModeBtn = document.getElementById('liveModeBtn');
    const status = document.getElementById('status');
    const fpsEl = document.getElementById('fps');

    // SVG 元素 - 分层控制
    const svgElements = {
        bodyGroup: document.getElementById('layer-body-group'),
        layerHead: document.getElementById('layer-head'),
        headShape: document.getElementById('head-shape'),
        headSpots: document.getElementById('head-spots'),
        layerGills: document.getElementById('layer-gills'),
        gillLeft: document.getElementById('gill-left'),
        gillRight: document.getElementById('gill-right'),
        layerEyes: document.getElementById('layer-eyes'),
        eyeLeftSocket: document.getElementById('eye-left-socket'),
        eyeRightSocket: document.getElementById('eye-right-socket'),
        eyeLeftInner: document.getElementById('eye-left-inner'),
        eyeRightInner: document.getElementById('eye-right-inner'),
        eyeLeftHighlight: document.getElementById('eye-left-highlight'),
        eyeRightHighlight: document.getElementById('eye-right-highlight'),
        layerBlush: document.getElementById('layer-blush'),
        blushLeft: document.getElementById('blush-left'),
        blushRight: document.getElementById('blush-right'),
        mouth: document.getElementById('mouth'),
        layerTail: document.getElementById('layer-tail'),
        tail: document.getElementById('tail'),
        bubbleContainer: document.getElementById('bubble-container')
    };

    let faceLandmarker = null;
    let visionResolver = null;
    let isRunning = false;
    let stream = null;
    let frameCount = 0;
    let lastTime = performance.now();

    // 尾巴待机动画
    let tailAngle = 0;
    let tailTime = 0;

    // ============ 平滑滤波（消除抖动） ============
    const smoothingFactor = 0.3;
    const eyeSmoothingFactor = 0.5;

    const prevData = {
        faceX: 0,
        faceY: 0,
        noseWidth: 0,
        headX: 0,
        headY: 0,
        blushLeftX: 0,
        blushLeftY: 0,
        blushRightX: 0,
        blushRightY: 0,
        eyeLeftX: 0,
        eyeLeftY: 0,
        eyeRightX: 0,
        eyeRightY: 0,
        irisLeftX: 0,
        irisLeftY: 0,
        irisRightX: 0,
        irisRightY: 0,
        eyeBlinkLeft: 0,
        eyeBlinkRight: 0,
        eyeLookInLeft: 0,
        eyeLookOutLeft: 0,
        eyeLookUpLeft: 0,
        eyeLookDownLeft: 0,
        eyeLookInRight: 0,
        eyeLookOutRight: 0,
        eyeLookUpRight: 0,
        eyeLookDownRight: 0,
        jawOpen: 0
    };

    // 死区阈值 - 🔥 降低阈值，提高灵敏度
    const deadZone = 0.003;
    const eyeDeadZone = 0.015;
    const irisDeadZone = 0.012; // 从 0.02 降低到 0.012，提高灵敏度

    function smoothValue(current, prev, factor) {
        return prev + (current - prev) * factor;
    }

    function applyDeadZone(value, threshold) {
        if (Math.abs(value) < threshold) return 0;
        return value;
    }

    function mapIrisMovement(value, maxRange) {
        const normalized = value / maxRange;
        const curved = Math.sin(normalized * Math.PI / 2) * maxRange;
        return curved;
    }

    // 🔥 新增：微颤噪声（增加真实感）
    function microTremor(time, amplitude = 0.8) {
        return Math.sin(time * 2.3) * Math.sin(time * 1.7) * amplitude;
    }

    function updateFps() {
        frameCount++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
            fpsEl.textContent = `FPS: ${frameCount}`;
            frameCount = 0;
            lastTime = now;
        }
    }

    // 绘制 FaceMesh 网格
    function drawFaceMesh(landmarks) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!landmarks || landmarks.length < 468) return;

        const connections = [
            [10, 338], [338, 297], [297, 332], [332, 284], [284, 251],
            [251, 389], [389, 356], [356, 454], [454, 323], [323, 361],
            [361, 288], [288, 397], [397, 365], [365, 379], [379, 378],
            [378, 400], [400, 377], [377, 152], [152, 148], [148, 176],
            [176, 149], [149, 150], [150, 136], [136, 172], [172, 58],
            [58, 132], [132, 93], [93, 234], [234, 127], [127, 162],
            [162, 21], [21, 54], [54, 103], [103, 67], [67, 109], [109, 10],
            [61, 146], [146, 91], [91, 181], [181, 84], [84, 17],
            [17, 314], [314, 405], [405, 321], [321, 375], [375, 291],
            [61, 185], [185, 40], [40, 39], [39, 37], [37, 0],
            [0, 267], [267, 269], [269, 270], [270, 409], [409, 291],
            [1, 2], [2, 97], [97, 98], [98, 126], [126, 246],
            [246, 197], [197, 195], [195, 6],
            [33, 160], [160, 158], [158, 159], [159, 157], [157, 173], [173, 133],
            [33, 7], [7, 163], [163, 144], [144, 145], [145, 153], [153, 133],
            [362, 385], [385, 387], [387, 388], [388, 466], [466, 263],
            [362, 382], [382, 381], [381, 380], [380, 374], [374, 373], [373, 362]
        ];

        ctx.strokeStyle = '#00FF00';
        ctx.lineWidth = 1.5;

        connections.forEach(([i, j]) => {
            if (landmarks[i] && landmarks[j]) {
                const x1 = landmarks[i].x * canvas.width;
                const y1 = landmarks[i].y * canvas.height;
                const x2 = landmarks[j].x * canvas.width;
                const y2 = landmarks[j].y * canvas.height;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        });
    }

    // 尾巴待机摆动动画
    function animateTail() {
        tailTime += 0.05;
        tailAngle = Math.sin(tailTime) * 5;

        if (svgElements.tail) {
            svgElements.tail.setAttribute('transform', `rotate(${tailAngle} 200 450)`);
        }

        if (isRunning) {
            requestAnimationFrame(animateTail);
        }
    }

    // 应用表情到 SVG
    function applyExpression(landmarks, results = null) {
        if (!landmarks || landmarks.length < 468) return;

        // ============ 获取 Blendshapes 表情系数 ============
        let blendshapes = null;
        if (results && results.faceBlendshapes && results.faceBlendshapes.length > 0) {
            blendshapes = results.faceBlendshapes[0].categories;
        }

        function getBlendshapeValue(name, defaultValue = 0) {
            if (!blendshapes) return defaultValue;
            const item = blendshapes.find(b => b.categoryName === name);
            return item ? parseFloat(item.score) : defaultValue;
        }

        // 平滑处理眨眼
        const rawBlinkLeft = getBlendshapeValue('eyeBlinkLeft', 0);
        const rawBlinkRight = getBlendshapeValue('eyeBlinkRight', 0);
        const blinkLeft = smoothValue(rawBlinkLeft, prevData.eyeBlinkLeft, 0.4);
        const blinkRight = smoothValue(rawBlinkRight, prevData.eyeBlinkRight, 0.4);
        prevData.eyeBlinkLeft = blinkLeft;
        prevData.eyeBlinkRight = blinkRight;

        // 眼球转动系数
        const lookInLeft = getBlendshapeValue('eyeLookInLeft', 0);
        const lookOutLeft = getBlendshapeValue('eyeLookOutLeft', 0);
        const lookUpLeft = getBlendshapeValue('eyeLookUpLeft', 0);
        const lookDownLeft = getBlendshapeValue('eyeLookDownLeft', 0);

        const lookInRight = getBlendshapeValue('eyeLookInRight', 0);
        const lookOutRight = getBlendshapeValue('eyeLookOutRight', 0);
        const lookUpRight = getBlendshapeValue('eyeLookUpRight', 0);
        const lookDownRight = getBlendshapeValue('eyeLookDownRight', 0);

        // 计算净偏移量
        const horizontalLeft = lookOutLeft - lookInLeft;
        const verticalLeft = lookUpLeft - lookDownLeft;
        const horizontalRight = lookOutRight - lookInRight;
        const verticalRight = lookUpRight - lookDownRight;

        // 下巴张开程度（惊讶/兴奋时瞳孔放大）
        const rawJawOpen = getBlendshapeValue('jawOpen', 0);
        const jawOpen = smoothValue(rawJawOpen, prevData.jawOpen, 0.3);
        prevData.jawOpen = jawOpen;

        // 惊讶时瞳孔放大（最大放大 1.2 倍）
        const pupilScale = 1 + jawOpen * 0.2;

        // ============ 1. 身体组整体平移 + 缩放 ============
        const noseTip = landmarks[1];
        const noseBase = landmarks[4];
        const forehead = landmarks[10];
        const chin = landmarks[152];

        const rawFaceX = (forehead.x + chin.x) / 2;
        const rawFaceY = (forehead.y + chin.y) / 2;

        const faceXDelta = rawFaceX - prevData.faceX;
        const faceYDelta = rawFaceY - prevData.faceY;

        const faceX = Math.abs(faceXDelta) < deadZone ? prevData.faceX : rawFaceX;
        const faceY = Math.abs(faceYDelta) < deadZone ? prevData.faceY : rawFaceY;

        prevData.faceX = faceX;
        prevData.faceY = faceY;

        const bodyOffsetX = (faceX - 0.5) * 200;
        const bodyOffsetY = (faceY - 0.45) * 150;

        const rawNoseWidth = Math.abs(landmarks[273]?.x - landmarks[6]?.x) || 0;
        const noseWidth = smoothValue(rawNoseWidth, prevData.noseWidth, smoothingFactor);
        prevData.noseWidth = noseWidth;
        const bodyScale = 1 + (noseWidth - 0.08) * 3;

        if (svgElements.bodyGroup) {
            svgElements.bodyGroup.setAttribute('transform',
                `translate(${bodyOffsetX}, ${bodyOffsetY}) scale(${bodyScale})`);
        }

        // ============ 2. 头部相对平移 ============
        const rawHeadX = faceX;
        const rawHeadY = faceY;

        const headXDelta = rawHeadX - prevData.headX;
        const headYDelta = rawHeadY - prevData.headY;

        const headX = Math.abs(headXDelta) < deadZone ? prevData.headX : rawHeadX;
        const headY = Math.abs(headYDelta) < deadZone ? prevData.headY : rawHeadY;

        prevData.headX = headX;
        prevData.headY = headY;

        const headOffsetX = (headX - 0.5) * 50;
        const headOffsetY = (headY - 0.45) * 30;

        if (svgElements.layerHead) {
            svgElements.layerHead.setAttribute('transform',
                `translate(${headOffsetX}, ${headOffsetY})`);
        }

        // ============ 3. 腮红独立动捕 ============
        const leftCheek = landmarks[116];
        const rightCheek = landmarks[345];

        if (leftCheek && rightCheek) {
            const rawBlushLeftX = (leftCheek.x - 0.35) * 80;
            const rawBlushLeftY = (leftCheek.y - 0.45) * 60;
            const rawBlushRightX = (rightCheek.x - 0.55) * 80;
            const rawBlushRightY = (rightCheek.y - 0.45) * 60;

            const blushLeftXDelta = rawBlushLeftX - prevData.blushLeftX;
            const blushLeftYDelta = rawBlushLeftY - prevData.blushLeftY;
            const blushRightXDelta = rawBlushRightX - prevData.blushRightX;
            const blushRightYDelta = rawBlushRightY - prevData.blushRightY;

            const blushLeftX = Math.abs(blushLeftXDelta) < deadZone ? prevData.blushLeftX : rawBlushLeftX;
            const blushLeftY = Math.abs(blushLeftYDelta) < deadZone ? prevData.blushLeftY : rawBlushLeftY;
            const blushRightX = Math.abs(blushRightXDelta) < deadZone ? prevData.blushRightX : rawBlushRightX;
            const blushRightY = Math.abs(blushRightYDelta) < deadZone ? prevData.blushRightY : rawBlushRightY;

            prevData.blushLeftX = blushLeftX;
            prevData.blushLeftY = blushLeftY;
            prevData.blushRightX = blushRightX;
            prevData.blushRightY = blushRightY;

            if (svgElements.blushLeft && svgElements.blushRight) {
                svgElements.blushLeft.setAttribute('transform', `translate(${blushLeftX}, ${blushLeftY})`);
                svgElements.blushRight.setAttribute('transform', `translate(${blushRightX}, ${blushRightY})`);
            }
        }

        // ============ 4. 外鳃摆动 ============
        const gillAngle = Math.sin(tailTime * 2) * 8;
        if (svgElements.gillLeft && svgElements.gillRight) {
            svgElements.gillLeft.setAttribute('transform', `rotate(${gillAngle} 300 250)`);
            svgElements.gillRight.setAttribute('transform', `rotate(${-gillAngle} 570 250)`);
        }

        // ============ 5. 眼睛眼眶平移 ============
        const leftEyeLeft = landmarks[33];
        const leftEyeRight = landmarks[133];
        const rightEyeLeft = landmarks[362];
        const rightEyeRight = landmarks[263];

        let eyeOffsetLeftX = 0, eyeOffsetLeftY = 0;
        let eyeOffsetRightX = 0, eyeOffsetRightY = 0;

        if (leftEyeLeft && leftEyeRight && rightEyeLeft && rightEyeRight) {
            const rawLeftEyeX = (leftEyeLeft.x + leftEyeRight.x) / 2;
            const rawLeftEyeY = (leftEyeLeft.y + leftEyeRight.y) / 2;
            const rawRightEyeX = (rightEyeLeft.x + rightEyeRight.x) / 2;
            const rawRightEyeY = (rightEyeLeft.y + rightEyeRight.y) / 2;

            const leftEyeXDelta = rawLeftEyeX - prevData.eyeLeftX;
            const leftEyeYDelta = rawLeftEyeY - prevData.eyeLeftY;
            const rightEyeXDelta = rawRightEyeX - prevData.eyeRightX;
            const rightEyeYDelta = rawRightEyeY - prevData.eyeRightY;

            const leftEyeX = Math.abs(leftEyeXDelta) < deadZone ? prevData.eyeLeftX : rawLeftEyeX;
            const leftEyeY = Math.abs(leftEyeYDelta) < deadZone ? prevData.eyeLeftY : rawLeftEyeY;
            const rightEyeX = Math.abs(rightEyeXDelta) < deadZone ? prevData.eyeRightX : rawRightEyeX;
            const rightEyeY = Math.abs(rightEyeYDelta) < deadZone ? prevData.eyeRightY : rawRightEyeY;

            prevData.eyeLeftX = leftEyeX;
            prevData.eyeLeftY = leftEyeY;
            prevData.eyeRightX = rightEyeX;
            prevData.eyeRightY = rightEyeY;

            eyeOffsetLeftX = (leftEyeX - 0.35) * 100;
            eyeOffsetLeftY = (leftEyeY - 0.35) * 100;
            eyeOffsetRightX = (rightEyeX - 0.55) * 100;
            eyeOffsetRightY = (rightEyeY - 0.35) * 100;

            if (svgElements.eyeLeftSocket && svgElements.eyeRightSocket) {
                svgElements.eyeLeftSocket.setAttribute('transform', `translate(${eyeOffsetLeftX}, ${eyeOffsetLeftY})`);
                svgElements.eyeRightSocket.setAttribute('transform', `translate(${eyeOffsetRightX}, ${eyeOffsetRightY})`);
            }
        }

        // ============ 6. 瞳孔追踪 + 眨眼 ============
        const leftEyeTop = landmarks[159];
        const leftEyeBottom = landmarks[145];
        const rightEyeTop = landmarks[386];
        const rightEyeBottom = landmarks[374];

        function getEyeOpenness(top, bottom, left, right) {
            if (!top || !bottom || !left || !right) return 0.3;
            const vertical = Math.abs(top.y - bottom.y);
            const horizontal = Math.abs(right.x - left.x);
            return vertical / horizontal;
        }

        const leftEyeOpenness = getEyeOpenness(leftEyeTop, leftEyeBottom, leftEyeLeft, leftEyeRight);
        const rightEyeOpenness = getEyeOpenness(rightEyeTop, rightEyeBottom, rightEyeLeft, rightEyeRight);
        const avgEyeOpenness = (leftEyeOpenness + rightEyeOpenness) / 2;

        // 眨眼检测：阈值 0.32
        const isBlinking = avgEyeOpenness < 0.32;

        // 虹膜追踪 - 结合关键点 + Blendshapes（增强版）
        const rawIrisLeftX = landmarks[468]?.x || leftEyeLeft?.x || 0;
        const rawIrisLeftY = landmarks[468]?.y || leftEyeTop?.y || 0;
        const rawIrisRightX = landmarks[473]?.x || rightEyeRight?.x || 0;
        const rawIrisRightY = landmarks[473]?.y || rightEyeTop?.y || 0;

        const irisLeftXDelta = rawIrisLeftX - prevData.irisLeftX;
        const irisLeftYDelta = rawIrisLeftY - prevData.irisLeftY;
        const irisRightXDelta = rawIrisRightX - prevData.irisRightX;
        const irisRightYDelta = rawIrisRightY - prevData.irisRightY;

        const irisLeftX = Math.abs(irisLeftXDelta) < irisDeadZone ? prevData.irisLeftX : rawIrisLeftX;
        const irisLeftY = Math.abs(irisLeftYDelta) < irisDeadZone ? prevData.irisLeftY : rawIrisLeftY;
        const irisRightX = Math.abs(irisRightXDelta) < irisDeadZone ? prevData.irisRightX : rawIrisRightX;
        const irisRightY = Math.abs(irisRightYDelta) < irisDeadZone ? prevData.irisRightY : rawIrisRightY;

        prevData.irisLeftX = irisLeftX;
        prevData.irisLeftY = irisLeftY;
        prevData.irisRightX = irisRightX;
        prevData.irisRightY = irisRightY;

        // 🔥 增强版：基础位移放大（从 100 提升到 160）
        const baseLeftX = (irisLeftX - 0.35) * 160;
        const baseLeftY = (irisLeftY - 0.4) * 130;
        const baseRightX = (irisRightX - 0.55) * 160;
        const baseRightY = (irisRightY - 0.4) * 130;

        // 🔥 增强版：Blendshapes 权重提升（从 15/12 提升到 25/20）
        // ⚠️ 注意：右眼的水平方向要取反，否则会变成斗鸡眼
        const blendshapeLeftX = horizontalLeft * 25;
        const blendshapeLeftY = verticalLeft * 20;
        const blendshapeRightX = -horizontalRight * 25; // 取反！
        const blendshapeRightY = verticalRight * 20;

        // S 形曲线映射 + 平滑
        const leftPupilX = mapIrisMovement(baseLeftX + blendshapeLeftX, 45);
        const leftPupilY = mapIrisMovement(baseLeftY + blendshapeLeftY, 35);
        const rightPupilX = mapIrisMovement(baseRightX + blendshapeRightX, 45);
        const rightPupilY = mapIrisMovement(baseRightY + blendshapeRightY, 35);

        // 调试输出
        // console.log(`👁️ Blink L:${blinkLeft.toFixed(2)} R:${blinkRight.toFixed(2)} | Look H:${horizontalLeft.toFixed(2)} V:${verticalLeft.toFixed(2)} | Iris L:[${irisLeftX.toFixed(3)},${irisLeftY.toFixed(3)}] Pupil X:${leftPupilX.toFixed(1)} Y:${leftPupilY.toFixed(1)}`);

        // 应用瞳孔和眨眼 - 使用渐进式眨眼
        if (svgElements.eyeLeftInner && svgElements.eyeRightInner) {
            // 渐进式眨眼：根据眨眼程度调整瞳孔形状
            const blinkFactor = Math.max(blinkLeft, blinkRight);

            if (blinkFactor > 0.6) {
                // 完全闭眼：瞳孔压扁成一条线
                svgElements.eyeLeftInner.setAttribute('ry', 2 * pupilScale);
                svgElements.eyeLeftInner.setAttribute('rx', 32);
                svgElements.eyeRightInner.setAttribute('ry', 2 * pupilScale);
                svgElements.eyeRightInner.setAttribute('rx', 32);
            } else if (blinkFactor > 0.3) {
                // 半闭眼：逐渐压扁
                const squashFactor = (blinkFactor - 0.3) / 0.3;
                const currentRy = (32 - squashFactor * 30) * pupilScale;
                svgElements.eyeLeftInner.setAttribute('ry', currentRy);
                svgElements.eyeLeftInner.setAttribute('rx', 32);
                svgElements.eyeRightInner.setAttribute('ry', currentRy);
                svgElements.eyeRightInner.setAttribute('rx', 32);
            } else {
                // 睁眼：正常圆形 + 虹膜追踪 + 瞳孔缩放
                svgElements.eyeLeftInner.setAttribute('ry', 32 * pupilScale);
                svgElements.eyeLeftInner.setAttribute('rx', 32 * pupilScale);
                svgElements.eyeRightInner.setAttribute('ry', 32 * pupilScale);
                svgElements.eyeRightInner.setAttribute('rx', 32 * pupilScale);
                svgElements.eyeLeftInner.setAttribute('cx', 380 + eyeOffsetLeftX + leftPupilX);
                svgElements.eyeLeftInner.setAttribute('cy', 320 + eyeOffsetLeftY + leftPupilY);
                svgElements.eyeRightInner.setAttribute('cx', 520 + eyeOffsetRightX + rightPupilX);
                svgElements.eyeRightInner.setAttribute('cy', 320 + eyeOffsetRightY + rightPupilY);
            }
        }

        // 高光跟随
        if (svgElements.eyeLeftHighlight && svgElements.eyeRightHighlight) {
            if (!isBlinking) {
                svgElements.eyeLeftHighlight.setAttribute('cx', 396 + eyeOffsetLeftX + leftPupilX * 0.6);
                svgElements.eyeLeftHighlight.setAttribute('cy', 306 + eyeOffsetLeftY + leftPupilY * 0.6);
                svgElements.eyeRightHighlight.setAttribute('cx', 536 + eyeOffsetRightX + rightPupilX * 0.6);
                svgElements.eyeRightHighlight.setAttribute('cy', 306 + eyeOffsetRightY + rightPupilY * 0.6);
            }
        }

        // ============ 7. 嘴巴（线条/填充切换） ============
        const mouthLeft = landmarks[61];
        const mouthRight = landmarks[291];
        const mouthTop = landmarks[13];
        const mouthBottom = landmarks[14];

        let mouthWidth = 0;
        if (mouthLeft && mouthRight) {
            mouthWidth = Math.abs(mouthRight.x - mouthLeft.x);
        }

        if (svgElements.mouth && mouthLeft && mouthRight && mouthTop && mouthBottom) {
            const mouthCenterX = (mouthLeft.x + mouthRight.x) / 2;
            const mouthCenterY = (mouthTop.y + mouthBottom.y) / 2;
            const mouthOffsetX = (mouthCenterX - 0.5) * 200;
            const mouthOffsetY = (mouthCenterY - 0.53) * 150;
            const mouthOpenness = Math.abs(mouthBottom.y - mouthTop.y);
            const fillThreshold = 0.025;

            let mouthPath;
            if (mouthOpenness > fillThreshold) {
                svgElements.mouth.setAttribute('fill', '#E76F51');
                svgElements.mouth.setAttribute('stroke', '#C44D3D');
                svgElements.mouth.setAttribute('stroke-width', '2');
                svgElements.mouth.setAttribute('stroke-linecap', 'round');
                const openDepth = Math.min(mouthOpenness * 600, 70);
                const cornerRadius = 8;
                mouthPath = `M${420 + mouthOffsetX} ${420 + mouthOffsetY}
                       Q${420 + mouthOffsetX} ${420 + mouthOffsetY + cornerRadius}
                       ${422 + mouthOffsetX} ${420 + mouthOffsetY + openDepth * 0.3}
                       Q${420 + mouthOffsetX} ${420 + mouthOffsetY + openDepth}
                       ${450 + mouthOffsetX} ${420 + mouthOffsetY + openDepth + 10}
                       Q${480 + mouthOffsetX} ${420 + mouthOffsetY + openDepth}
                       ${478 + mouthOffsetX} ${420 + mouthOffsetY + openDepth * 0.3}
                       Q${480 + mouthOffsetX} ${420 + mouthOffsetY + cornerRadius}
                       ${480 + mouthOffsetX} ${420 + mouthOffsetY}
                       Q${450 + mouthOffsetX} ${420 + mouthOffsetY - 5}
                       ${420 + mouthOffsetX} ${420 + mouthOffsetY}
                       Z`;
            } else {
                svgElements.mouth.setAttribute('fill', 'none');
                svgElements.mouth.setAttribute('stroke', '#E76F51');
                svgElements.mouth.setAttribute('stroke-width', '10');
                svgElements.mouth.setAttribute('stroke-linecap', 'round');
                const smileCurve = 20 + (mouthWidth - 0.2) * 80;
                mouthPath = `M${420 + mouthOffsetX} ${420 + mouthOffsetY}
                       Q${450 + mouthOffsetX} ${420 + mouthOffsetY + Math.max(smileCurve, 15)}
                       ${480 + mouthOffsetX} ${420 + mouthOffsetY}`;
            }
            svgElements.mouth.setAttribute('d', mouthPath);
        }

        // 腮红透明度
        if (svgElements.blushLeft && svgElements.blushRight) {
            const blushOpacity = 0.5 + Math.min(mouthWidth * 2, 0.5);
            svgElements.blushLeft.setAttribute('opacity', Math.max(0.3, blushOpacity));
            svgElements.blushRight.setAttribute('opacity', Math.max(0.3, blushOpacity));
        }
    }

    // 吐泡泡
    function createBubble() {
        if (!svgElements.bubbleContainer) return;
        const bubble = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        const size = Math.random() * 15 + 10;
        const x = Math.random() * 60 + 420;
        const y = 440;
        bubble.setAttribute('cx', x);
        bubble.setAttribute('cy', y);
        bubble.setAttribute('r', size);
        bubble.setAttribute('fill', 'url(#bubbleGrad)');
        bubble.setAttribute('stroke', '#e0f7fa');
        bubble.setAttribute('stroke-width', 2);
        svgElements.bubbleContainer.appendChild(bubble);
        let bubbleY = y;
        function moveBubble() {
            bubbleY -= 1;
            bubble.setAttribute('cy', bubbleY);
            const opacity = 1 - (bubbleY - 200) / 240;
            bubble.setAttribute('opacity', opacity);
            if (bubbleY > 200) {
                requestAnimationFrame(moveBubble);
            } else {
                svgElements.bubbleContainer.removeChild(bubble);
            }
        }
        requestAnimationFrame(moveBubble);
    }

    let config = {
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
    };

    async function getVisionResolver() {
        if (!visionResolver) {
            visionResolver = await FilesetResolver.forVisionTasks(
                'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
            );
        }
        return visionResolver;
    }

    async function reinitFaceLandmarker() {
        const wasRunning = isRunning;
        if (wasRunning) {
            isRunning = false; // Pause the processing loop
            await new Promise(resolve => setTimeout(resolve, 200)); // Give time for the loop to stop
        }

        status.textContent = '🔄 正在使用新参数重新加载模型...';

        try {
            const vision = await getVisionResolver();
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                    delegate: 'GPU'
                },
                outputFaceBlendshapes: true,
                outputFacialTransformationMatrixes: false,
                runningMode: 'VIDEO',
                maxNumFaces: 1,
                minDetectionConfidence: config.minDetectionConfidence,
                minTrackingConfidence: config.minTrackingConfidence
            });

            status.textContent = '✅ 模型已更新';

        } catch (error) {
            status.textContent = `❌ 模型更新失败: ${error.message}`;
        } finally {
            if (wasRunning) {
                isRunning = true;
                processFrame(); // Restart the processing loop
            }
        }
    }

    // 初始化 FaceLandmarker（使用 MediaPipe Tasks Vision API）
    async function initFaceLandmarker() {
        status.textContent = '🔄 正在加载 MediaPipe Tasks Vision 模型...';

        const vision = await getVisionResolver();

        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                delegate: 'GPU'
            },
            outputFaceBlendshapes: true,
            outputFacialTransformationMatrixes: false,
            runningMode: 'VIDEO',
            maxNumFaces: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        status.textContent = '✅ 模型加载完成';
    }

    // 启动
    async function start() {
        try {
            if (!faceLandmarker) {
                await initFaceLandmarker();
            }

            stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 }
            });

            video.srcObject = stream;
            await new Promise(resolve => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });

            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.textContent = '✅ 运行中 - 请面对摄像头';

            processFrame();
            animateTail();
            setInterval(createBubble, 3000);

        } catch (error) {
            status.textContent = '❌ 错误：' + error.message;
        }
    }

    // 处理帧
    async function processFrame() {
        if (!isRunning) return;

        const startTime = performance.now();
        if (faceLandmarker) {
            const results = faceLandmarker.detectForVideo(video, startTime);

            updateFps();

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];
                status.textContent = `✅ 追踪中 - ${landmarks.length} 个点`;
                drawFaceMesh(landmarks);
                applyExpression(landmarks, results);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                status.textContent = '🔍 未检测到面部';
            }
        }

        requestAnimationFrame(processFrame);
    }

    // 停止
    function stop() {
        isRunning = false;
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        video.srcObject = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        status.textContent = '已停止';
    }

    // ============ 直播模式逻辑 ============
    liveModeBtn.addEventListener('click', () => {
        const isActive = document.body.classList.toggle('live-mode-active');
        if (isActive) {
            liveModeBtn.textContent = '退出直播模式';
        } else {
            liveModeBtn.textContent = '进入直播模式';
        }
    });


    // 事件监听
    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
</script>
